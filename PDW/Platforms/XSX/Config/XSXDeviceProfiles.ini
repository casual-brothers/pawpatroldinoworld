; Clear BaseXSXDeviceProfile Rendering Settings
!CVars=ClearArray

;Rendering Settings

; Frame
+CVars=r.DynamicRes.OperationMode=2
+CVars=r.DynamicRes.FrameTimeBudget=16.66
+CVars=r.DynamicRes.MinScreenPercentage=50		; 1080
+CVars=r.DynamicRes.MaxScreenPercentage=100		; 4k
+CVars=t.MaxFPS=60.0

; AntiAliasing
+CVars=r.AntiAliasingMethod=4					; TSR

; XBox One uses 32-bit depth buffers
+CVars=r.D3D12.Depth24Bit=0

[XSX_Lockhart DeviceProfile]
DeviceType=XSX
BaseProfileName=XSX

; Clear BaseXSXDeviceProfile Rendering Settings
!CVars=ClearArray

;Rendering Settings

; Scalability
+CVars=sg.AntiAliasingQuality=3					; TSR
+CVars=sg.ViewDistanceQuality=3
+CVars=sg.ShadowQuality=3
+CVars=sg.GlobalIlluminationQuality=0
+CVars=sg.ReflectionQuality=0
+CVars=sg.PostProcessQuality=3
+CVars=sg.TextureQuality=3
+CVars=sg.EffectsQuality=3
+CVars=sg.FoliageQuality=3
+CVars=sg.ShadingQuality=0

[XSX_Anaconda DeviceProfile]
DeviceType=XSX
BaseProfileName=XSX

; Clear BaseXSXDeviceProfile Rendering Settings
!CVars=ClearArray

;Rendering Settings

; Scalability
+CVars=sg.AntiAliasingQuality=3					; TSR
+CVars=sg.ViewDistanceQuality=3
