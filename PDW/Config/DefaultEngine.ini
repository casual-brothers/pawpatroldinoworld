; HeterogeneousVolumes
r.HeterogeneousVolumes=0

; Geometry
r.SkinCache.CompileShaders=1
r.SupportDepthOnlyIndexBuffers=1
r.SupportReversedIndexBuffers=1

; Foliage
foliage.MinVertsToSplitNode=4096
foliage.SplitFactor=2

; Grass
grass.DisableDynamicShadows=1
grass.TickInterval=15

